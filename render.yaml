services:
  - type: web
    name: digiclinic-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: digiclinic-db
          property: connectionString
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: DigiClinic.Api
      - key: Jwt__Audience
        value: DigiClinic.Client
      - key: Jwt__ExpiresInMinutes
        value: 120
      - key: Frontend__AllowedOrigins__0
        sync: false
      - key: Frontend__AllowedOrigins__1
        value: https://digiclinic-client.onrender.com
      - key: Telegram__Enabled
        value: false

  - type: web
    name: digiclinic-client
    runtime: static
    buildCommand: cd digiclinic/digi-clinic-client && npm install && npm run build
    staticPublishPath: ./digiclinic/digi-clinic-client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://digiclinic-api.onrender.com/api

databases:
  - name: digiclinic-db
    databaseName: digiclinic_db
    user: digiclinic_user
    plan: free
